name: Kapa ingestion audit

on:
  schedule:
    # Weekdays 07:00 UTC (~09:00 Israel summer). Adjust as needed.
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit required repos vs Kapa sources
        env:
          KAPA_API_KEY: ${{ secrets.KAPA_API_KEY }}
          KAPA_PROJECT_ID: ${{ secrets.KAPA_PROJECT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 .scripts/kapa-ingestion-audit.py --verify-retrieval
